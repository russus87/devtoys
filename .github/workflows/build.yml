name: build

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Arch Linux — produces devtoys-<ver>-1-x86_64.pkg.tar.zst
  # ---------------------------------------------------------------------------
  arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install toolchain & deps
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git rust nodejs npm \
            webkit2gtk-4.1 gtk3 libappindicator-gtk3 \
            librsvg patchelf openssl sudo curl tar

      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(node -p "require('./package.json').version")"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build frontend + binary
        run: |
          npm ci
          bash scripts/fetch-pdfium.sh src-tauri/pdfium
          npx tauri build --no-bundle

      - name: Stage package artifacts
        run: |
          mkdir -p pkgstage
          cp src-tauri/target/release/devtoys pkgstage/devtoys
          cp packaging/devtoys.desktop pkgstage/devtoys.desktop
          cp packaging/PKGBUILD pkgstage/PKGBUILD
          cp src-tauri/pdfium/libpdfium.so pkgstage/libpdfium.so
          rsvg-convert -w 128 -h 128 assets/icon.svg -o pkgstage/icon-128.png
          rsvg-convert -w 256 -h 256 assets/icon.svg -o pkgstage/icon-256.png
          rsvg-convert -w 512 -h 512 assets/icon.svg -o pkgstage/icon-512.png
          sed -i "s/^pkgver=.*/pkgver=${{ steps.ver.outputs.version }}/" pkgstage/PKGBUILD

      - name: makepkg (.pkg.tar.zst)
        run: |
          useradd -m builder
          chown -R builder pkgstage
          cd pkgstage
          sudo -u builder makepkg -f --noconfirm
          ls -1 *.pkg.tar.zst

      - uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: pkgstage/*.pkg.tar.zst

      - name: Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: pkgstage/*.pkg.tar.zst

  # ---------------------------------------------------------------------------
  # Linux — produces .AppImage (+ .deb)
  # ---------------------------------------------------------------------------
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf libfuse2 file

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build bundles
        run: |
          npm ci
          bash scripts/fetch-pdfium.sh src-tauri/pdfium
          npx tauri build --bundles appimage deb

      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

      - name: Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  # ---------------------------------------------------------------------------
  # Windows — produces .msi (WiX) and -setup.exe (NSIS)
  # ---------------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build bundles
        shell: bash
        run: |
          npm ci
          bash scripts/fetch-pdfium.sh src-tauri/pdfium
          npx tauri build --bundles msi nsis

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe

      - name: Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe

  # ---------------------------------------------------------------------------
  # macOS — produces .dmg (Apple Silicon + Intel)
  # ---------------------------------------------------------------------------
  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build bundle
        run: |
          npm ci
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then export PDFIUM_ARCH=arm64; else export PDFIUM_ARCH=x64; fi
          PDFIUM_OS=mac bash scripts/fetch-pdfium.sh src-tauri/pdfium
          npx tauri build --target ${{ matrix.target }} --bundles dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
